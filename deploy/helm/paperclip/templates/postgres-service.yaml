apiVersion: v1
kind: Service
metadata:
  name: {{ include "paperclip.postgresService" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "paperclip.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
