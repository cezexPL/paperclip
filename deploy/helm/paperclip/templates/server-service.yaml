apiVersion: v1
kind: Service
metadata:
  name: {{ include "paperclip.serverService" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "paperclip.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: {{ .Values.server.port }}
      targetPort: http
