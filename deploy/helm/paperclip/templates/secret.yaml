apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paperclip.fullname" . }}-secret
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  DATABASE_URL: {{ include "paperclip.databaseUrl" . | quote }}
  BETTER_AUTH_SECRET: {{ .Values.secrets.betterAuthSecret | quote }}
