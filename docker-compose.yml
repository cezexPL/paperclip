services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paperclip-docker-2026}
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    restart: unless-stopped
    network_mode: host
    environment:
      DATABASE_URL: postgres://paperclip:${POSTGRES_PASSWORD:-paperclip-docker-2026}@127.0.0.1:5433/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "public"
      PAPERCLIP_PUBLIC_URL: "http://152.53.116.238:3100"
      PAPERCLIP_ALLOWED_HOSTNAMES: "152.53.116.238"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
    volumes:
      - paperclip-data:/paperclip
      - /home/rancher/.codex/auth.json:/paperclip/.codex/auth.json:ro
      - /home/rancher/.codex/config.toml:/paperclip/.codex/config.toml:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  paperclip-data:
